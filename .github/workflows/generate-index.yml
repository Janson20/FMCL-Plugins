name: Generate Plugin Index

on:
  push:
    branches: [main, master]
    paths:
      - 'plugins/**'
      - 'scripts/**'
      - '.github/workflows/generate-index.yml'
      - 'index.json'
  workflow_dispatch:
    inputs:
      skip_check:
        description: 'Skip validation and force generate'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate index.json
        id: generate
        run: |
          python scripts/generate_index.py --repo ${{ github.repository }}
          echo "status=success" >> $GITHUB_OUTPUT
          # 生成插件列表用于 PR body
          PLUGIN_NAMES=$(python -c "
          import json
          with open('index.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          names = [p.get('name', p['id']) for p in data.get('plugins', [])]
          print('\\n'.join(f'- {n}' for n in names))
          ")
          echo "plugin_list<<EOF" >> $GITHUB_OUTPUT
          echo "$PLUGIN_NAMES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check validation errors
        id: check
        run: |
          if [ -f index.json ]; then
            ERROR_COUNT=$(python -c "
          import json
          with open('index.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          errs = data.get('_validation_errors', [])
          print(len(errs))
          ")
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "WARNING: $ERROR_COUNT plugin(s) have validation errors"
              echo "has_errors=true" >> $GITHUB_OUTPUT
            else
              echo "All plugins validated successfully"
              echo "has_errors=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "ERROR: index.json was not generated"
            echo "has_errors=true" >> $GITHUB_OUTPUT
          fi

      - name: Show generated stats
        run: |
          python -c "
          import json
          with open('index.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(f'Total plugins: {data[\"stats\"][\"total_plugins\"]}')
          print(f'Generated at: {data[\"meta\"][\"generated_at\"]}')
          for p in data.get('plugins', []):
              print(f'  - {p[\"id\"]} v{p[\"version\"]} ({p[\"author\"]})')
          "

      - name: Auto-commit index.json
        if: steps.check.outputs.has_errors == 'false'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # 检查 index.json 是否有变更
          git add index.json
          if git diff --cached --quiet; then
            echo "index.json 无变更，跳过提交"
          else
            git commit -m 'chore(index): 自动更新插件索引'
            git push
            echo "已自动提交 index.json 更新"
          fi
