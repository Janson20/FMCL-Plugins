name: Generate Plugin Index

on:
  push:
    branches: [main, master]
    paths:
      - 'plugins/**/plugin.json'
      - 'scripts/generate_index.py'
  workflow_dispatch:
    inputs:
      skip_check:
        description: 'Skip validation and force generate'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate index.json
        id: generate
        run: |
          python scripts/generate_index.py --repo ${{ github.repository }}
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check validation errors
        id: check
        run: |
          if [ -f index.json ]; then
            ERROR_COUNT=$(python -c "
          import json
          with open('index.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          errs = data.get('_validation_errors', [])
          print(len(errs))
          ")
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "WARNING: $ERROR_COUNT plugin(s) have validation errors"
              echo "has_errors=true" >> $GITHUB_OUTPUT
            else
              echo "All plugins validated successfully"
              echo "has_errors=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "ERROR: index.json was not generated"
            echo "has_errors=true" >> $GITHUB_OUTPUT
          fi

      - name: Show generated stats
        run: |
          python -c "
          import json
          with open('index.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          print(f'Total plugins: {data[\"stats\"][\"total_plugins\"]}')
          print(f'Generated at: {data[\"meta\"][\"generated_at\"]}')
          for p in data.get('plugins', []):
              print(f'  - {p[\"id\"]} v{p[\"version\"]} ({p[\"author\"]})')
          "

      - name: Create Pull Request
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: auto-generate index.json'
          title: 'chore(index): auto-generate index.json'
          body: |
            This PR is automatically generated by the [Generate Plugin Index](.github/workflows/generate-index.yml) workflow.

            ## Changes
            - Regenerated `index.json` from current `plugins/` directory

            ### Included plugins
            ${{ steps.generate.outputs.plugin_list || 'See workflow run for details' }}

            ---
            *Auto-generated by GitHub Actions*
          branch: chore/update-index
          delete-branch: true
          labels: |
            automated
            index-update
